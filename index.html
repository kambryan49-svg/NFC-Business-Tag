<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Business Tag</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="profile">
                <img src="https://via.placeholder.com/150" alt="Profile Picture" class="profile-img">
                <h1>NFC Business Tag</h1>
                <p>Connect with me on social media</p>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Social Media Links -->
            <div class="section">
                <h2>Follow Me</h2>
                <div class="links-grid">
                    <!-- Facebook -->
                    <a href="https://www.facebook.com/" target="_blank" class="link-card facebook">
                        <i class="fab fa-facebook-f"></i>
                        <span>Facebook</span>
                    </a>

                    <!-- Instagram -->
                    <a href="https://www.instagram.com/" target="_blank" class="link-card instagram">
                        <i class="fab fa-instagram"></i>
                        <span>Instagram</span>
                    </a>

                    <!-- TikTok -->
                    <a href="https://www.tiktok.com/" target="_blank" class="link-card tiktok">
                        <i class="fab fa-tiktok"></i>
                        <span>TikTok</span>
                    </a>

                    <!-- Email -->
                    <a href="mailto:your-email@example.com" class="link-card email">
                        <i class="fas fa-envelope"></i>
                        <span>Email</span>
                    </a>

                    <!-- WhatsApp QR -->
                    <button class="link-card whatsapp" id="whatsappBtn">
                        <i class="fab fa-whatsapp"></i>
                        <span>WhatsApp QR</span>
                    </button>

                    <!-- Save Phone Contact -->
                    <button class="link-card phone" id="phoneBtn">
                        <i class="fas fa-phone"></i>
                        <span>Save Contact</span>
                    </button>

                    <!-- Looping Icon -->
                    <button class="link-card loop" id="loopBtn">
                        <i class="fas fa-sync"></i>
                        <span>Loop</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Modals -->
        <!-- WhatsApp QR Modal -->
        <div id="whatsappModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>WhatsApp QR Code</h2>
                <p>Scan this QR code to message me on WhatsApp</p>
                <div class="qr-container">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://wa.me/1234567890" alt="WhatsApp QR Code" class="qr-code">
                </div>
                <p class="qr-note">Or click to open WhatsApp directly:</p>
                <a href="https://wa.me/1234567890" target="_blank" class="btn btn-primary">Open WhatsApp</a>
            </div>
        </div>

        <!-- Phone Contact Modal -->
        <div id="phoneModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Save Contact</h2>
                <p>Save this contact to your phone</p>
                <div class="contact-form">
                    <div class="form-group">
                        <label>Name:</label>
                        <input type="text" id="contactName" value="Your Name" readonly>
                    </div>
                    <div class="form-group">
                        <label>Phone:</label>
                        <input type="tel" id="contactPhone" value="+1 234 567 8900" readonly>
                    </div>
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" id="contactEmail" value="your-email@example.com" readonly>
                    </div>
                    <button class="btn btn-primary" id="downloadVcardBtn">Download vCard (.vcf)</button>
                </div>
            </div>
        </div>

        <!-- Loop Animation Modal -->
        <div id="loopModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Looping Animation</h2>
                <div class="loop-animation">
                    <div class="spinner"></div>
                </div>
                <p>Loading...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
